spring:
  application:
    name: up
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:h2:file:./data/updb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

feign:
  example-api:
    url: ${EXAMPLE_API_URL:http://localhost:8080}
  upbit:
    base-url: ${UPBIT_API_URL:https://api.upbit.com}

trading:
  # PAPER : LivePosition·SignalLog DB 기록 O | 실제 업비트 주문 API 호출 X
  # LIVE  : LivePosition·SignalLog DB 기록 O | 실제 업비트 주문 API 호출 O (미구현)
  # 캔들 타입·전략 타입은 전략 구현체(ScalpingStrategy 등)에서 직접 정의
  mode: PAPER
  market: KRW-BTC
  initial-capital: 1000000       # 일일 손실 한도 계산 기준 (단위: 원)
  invest-ratio: 1.0              # 매수 시 자본 투입 비율 (0~1)
  daily-loss-limit-percent: 3.0  # 일일 손실 한도 (%)
  candle-warmup-count: 200       # 지표 계산 최소 캔들 수
  scheduler-enabled: true        # true 시 자동매매 스케줄러 활성화
  # 스캘핑 전략 파라미터
  ema-short-period: 9
  ema-long-period: 21
  rsi-period: 14
  rsi-momentum: 50
  atr-period: 14
  atr-stop-multiplier: 1.5
  atr-take-multiplier: 2.5
  adx-period: 14
  adx-threshold: 25
  volume-sma-period: 20
  volume-multiplier: 1.2
  htf-ema-period: 288
  trade-start-hour: 9
  trade-end-hour: 22

logging:
  level:
    com.clone.up.client: DEBUG  # Feign 요청/응답 로그
